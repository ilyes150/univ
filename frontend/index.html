<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>UniDZ · Student Portal</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="Style.css" />
    </head>
    <body>
        <canvas id="bg-canvas"></canvas>
        <div id="app">
        <aside id="sidebar">
            <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(30 12 12)"/>
                <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(150 12 12)"/>
                </svg>
            </div>
            <div class="brand-text">
                <h1>Uni<span>DZ</span></h1>
                <small>Student Portal</small>
            </div>
            </div>

            <nav>
            <div class="nav-item active" data-page="home" onclick="navigate('home', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Home</span>
                <div class="nav-dot"></div>
            </div>

            <div class="nav-item" data-page="records" onclick="navigate('records', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>Records</span>
            </div>
            </nav>
        </aside>

        <div id="main">
            <header id="header">
            <div class="header-breadcrumb">
                UniDZ / <span id="breadcrumb-label">Home</span>
            </div>
            <div class="header-status">
                <div class="status-dot"></div>
                Session Active
            </div>
            </header>
            
            <div id="content">
            <div class="page active" id="page-home">
                <div class="home-welcome-message" id="welcome-text">Welcome, Loading...</div>
                <div class="profile-details" id="profile-details"></div>
            </div>

            <div class="page" id="page-records">
                <div class="section-title">Academic Logs</div>
                <div class="section-sub">Validated semester performance matrices</div>
                <div class="sem-tabs">
                <div class="sem-tab active" onclick="selectSem(1, this)">Semester 01</div>
                <div class="sem-tab"        onclick="selectSem(2, this)">Semester 02</div>
                <div class="sem-tab"        onclick="selectSem(3, this)">Semester 03</div>
                <div class="sem-tab locked" title="Term Data Unreleased">Semester 04</div>
                </div>
                <div id="sem-content"></div>
            </div>

            </div>
        </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
