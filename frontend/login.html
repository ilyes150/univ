<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniDZ · Secure Access Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="Style.css" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-header h2 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -1px;
        }
        .login-header h2 span {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        .login-header small {
            display: block;
            color: var(--text-muted);
            font-family: var(--font-mono);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 10px;
            margin-top: 5px;
        }
        .input-group {
            margin-bottom: 22px;
        }
        .input-group label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            background: rgba(5, 8, 16, 0.6);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            box-sizing: border-box;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }
        .login-submit-btn {
            width: 100%;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: var(--radius-sm);
            color: var(--accent);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.25s, box-shadow 0.25s, opacity 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-submit-btn:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .login-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-error-msg {
            background: rgba(255, 74, 107, 0.1);
            border-left: 3px solid var(--error);
            color: var(--error);
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="login-card">
        <div class="login-header">
            <h2>Uni<span>DZ</span></h2>
            <small>Secure Access Terminal</small>
        </div>

        <div id="login-error" class="login-error-msg"></div>

        <form id="login-form">
            <div class="input-group">
                <label for="auth-username">Matricule / Username</label>
                <input type="text" id="auth-username" required autocomplete="username" placeholder="e.g., 242435342409" />
            </div>
            <div class="input-group">
                <label for="auth-password">Security Access Key</label>
                <input type="password" id="auth-password" required autocomplete="current-password" placeholder="••••••••" />
            </div>
            <button type="submit" id="submit-btn" class="login-submit-btn">
                <span class="spinner" id="btn-spinner"></span>
                <span id="btn-label">Establish Connection</span>
            </button>
        </form>
    </div>

    <script src="JS/login.js"></script>
</body>
</html>
