version: '3.8'

services:
    # PostgreSQL 
    postgres-db:
        image: postgres:15-alpine
        container_name: unidz-postgres
        environment:
            POSTGRES_DB: unidz_portal
            POSTGRES_USER: engine_admin
            POSTGRES_PASSWORD: VaultSecurePassword2026
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./init-scripts:/docker-entrypoint-initdb.d
        networks:
            - unidz-network

        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U engine_admin -d unidz_portal"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

    # Spring Boot Backend
    backend-api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: unidz-backend
        ports:
            - "8080:8080"
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/unidz_portal
            SPRING_DATASOURCE_USERNAME: engine_admin
            SPRING_DATASOURCE_PASSWORD: VaultSecurePassword2026
            SPRING_JPA_HIBERNATE_DDL_AUTO: update

        depends_on:
            postgres-db:
                condition: service_healthy
        networks:
            - unidz-network
        restart: on-failure
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 30s

    # Nginx — serves the frontend + proxies /api to the backend
    frontend:
        image: nginx:alpine
        container_name: unidz-frontend
        ports:
            - "80:80"
        volumes:
            - ./frontend:/usr/share/nginx/html:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
        backend-api:
                condition: service_healthy
        networks:
            - unidz-network
        restart: unless-stopped

volumes:
    pgdata:

networks:
    unidz-network:
        driver: bridge