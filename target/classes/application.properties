spring.application.name=unidz-portal-api

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/unidz_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:engine_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:VaultSecurePassword2026}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=8080

# FIX: expose /actuator/health so the Docker healthcheck can poll it
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
